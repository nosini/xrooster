name: Create Release

on:
  workflow_dispatch:

env:
  flutter-version: "3.41.3"

jobs:
  update_files:
    name: Update files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Read version from pubspec.yaml
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate schools list
        run: python scripts/update_readme.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          cache: true

      - name: Generate screenshots
        run: flutter test --update-goldens

      - name: Commit changes
        run: |
          git config user.name "Epic Bot"
          git config user.email "bot@epic.com"
          git add -A
          # Only commit if there are actual changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Release v${{ env.APP_VERSION }}" && git push)

  android:
    name: Build Android
    needs: update_files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          cache: true

      # SIGNING LOGIC: Only runs if the secret is present
      - name: Decode Android keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n ' | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat <<EOF > android/key.properties
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=upload
          EOF

      # BUILD LOGIC: Build Release if signed, otherwise build Debug
      - name: Build APK (Signed Release)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: flutter build apk --release --split-per-abi

      - name: Build APK (Unsigned/Debug Fallback)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: flutter build apk --debug

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/app/outputs/flutter-apk/*.apk

  release:
    name: Create GitHub Release
    needs: [android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Read version from pubspec.yaml
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: apk-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          generate_release_notes: true
          files: apk-files/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
