name: Create Release

on:
  workflow_dispatch:

env:
  flutter-version: "3.41.3"

jobs:
  build_android:
    name: Build and Release Android
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for creating the release and pushing tag

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          cache: true

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      # This step handles the signing if you ever add the secrets
      - name: Setup Signing
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n ' | base64 --decode > android/app/upload-keystore.jks
          cat <<EOF > android/key.properties
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=upload
          EOF

      - name: Build APK
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            flutter build apk --release --split-per-abi
          else
            flutter build apk --debug
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
