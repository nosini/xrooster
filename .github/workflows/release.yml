name: Create Release

on:
  workflow_dispatch:

env:
  flutter-version: "3.41.3"

jobs:
  build_android:
    name: Build and Release Android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          cache: true

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build APK
        env:
          # Pass secrets as environment variables to avoid the YAML 'if' error
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PW: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Secrets found! Building Signed Release APK..."
            
            # Decode keystore
            echo "$KEYSTORE_B64" | tr -d '\n ' | base64 --decode > android/app/upload-keystore.jks
            
            # Create key.properties
            cat <<EOF > android/key.properties
            storeFile=upload-keystore.jks
            storePassword=$KEYSTORE_PW
            keyPassword=$KEYSTORE_PW
            keyAlias=upload
          EOF
            
            flutter build apk --release --split-per-abi
          else
            echo "No secrets found. Building Debug APK instead..."
            flutter build apk --debug
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          generate_release_notes: true
          # This glob finds any APKs in the output folder
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
